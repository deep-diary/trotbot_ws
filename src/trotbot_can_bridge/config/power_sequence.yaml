/**:
  ros__parameters:
    joy_topic: /joy
    body_pose_topic: body_pose
    cmd_vel_topic: cmd_vel
    tx_topic: /can_tx_frames
    gate_topic: /power_sequence/gate_open
    state_topic: /power_sequence/state
    command_topic: /power_sequence/command

    can_tx_frames_qos_depth: 4000
    motor_master_id: 253

    # 默认按键（PS4/Linux 常见：□=3 ○=1）：L1+R1 或 □长按 上电/start；L1+R1+Share 下电；○长按 prone（保持使能）
    # button_square: -1 可关闭「□ = start」
    button_l1: 4
    button_r1: 5
    button_share: 8
    button_circle: 1
    button_square: 3
    start_longpress_s: 1.0
    shutdown_longpress_s: 1.0
    prone_longpress_s: 0.8

    # 趴下/下电 SoftProne：起点 z 默认跟踪 /body_pose（与 teleop 同语义：相对 nominal_height 的增量），避免“先抬回 stand_z 再趴”
    # 站起 SoftStand（从 ProneHold 或趴下动画末尾挂起 start）：目标 z 使用趴下前记录的 stand_resume_z（非仅 stand_z）
    track_body_pose_height: true
    body_pose_stale_s: 2.0
    track_z_clamp_min: -0.5
    track_z_clamp_max: 0.5

    # 启停时序（秒）
    timer_period_ms: 20
    precheck_duration_s: 0.20
    init_hold_duration_s: 0.35
    stand_duration_s: 2.50
    prone_duration_s: 2.50

    # body_pose.position.z 目标（相对 nominal_height 的增量）
    stand_z: 0.0
    prone_z: -0.2

    # 启动默认不重设零位（zero_sta 已切换为 ±π）
    send_set_zero_in_startup: false
    send_enable_in_startup: true
    send_mit_zero_in_startup: true

    # 主动上报（通信类型 24 / CAN ID 0x18）：与 0x02 反馈同数据域，motor_protocol 统一解析；上电无查询反馈时 RViz 仍可刷新。
    # 下电 Disable 仅发失能，不关闭主动上报，便于 RViz 在全生命周期内仍能看到实际关节（关上报请用 el05_motor_cansend.sh reset 等）
    enable_active_report_in_startup: true
    # launch 后 Idle 即发一次 0x7026 + 上报 ON（无需等 start），便于 RViz 反馈模型尽早有实测角
    enable_active_report_at_launch: true
    # 延迟秒数：略晚于 can_transport 订阅 /can_tx_frames，避免首包丢失
    active_report_boot_delay_s: 0.25
    # 目标频率（Hz），内部写入 0x7026 EPScan_time（换算同 el05_motor_cansend.sh）
    active_report_hz: 10.0
    # 上报帧 ID 内主站字节；-1 表示与 motor_master_id 相同（若手册要求主站 0，可改为 0）
    active_report_master_id: -1

    # MIT 首帧参数（与 control_gains.yaml 默认 kp/kd 一致，避免上电首帧过软）
    init_kp: 50.0
    init_kd: 2.5
    init_velocity: 0.0
    init_tau: 0.0

