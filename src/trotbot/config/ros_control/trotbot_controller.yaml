# TrotBot ROS Control Configuration
# Joint controller configuration for TrotBot quadruped robot

trotbot_joint_controller:
  type: "position_controllers/JointTrajectoryController"
  joints:
    - "front_right_shoulder_joint"
    - "front_right_leg_joint" 
    - "front_right_foot_joint"
    - "front_left_shoulder_joint"
    - "front_left_leg_joint"
    - "front_left_foot_joint"
    - "rear_right_shoulder_joint"
    - "rear_right_leg_joint"
    - "rear_right_foot_joint"
    - "rear_left_shoulder_joint"
    - "rear_left_leg_joint"
    - "rear_left_foot_joint"

  constraints:
    goal_time: 0.5
    front_right_shoulder_joint:
      trajectory: 0.1
      goal: 0.1
    front_right_leg_joint:
      trajectory: 0.1
      goal: 0.1
    front_right_foot_joint:
      trajectory: 0.1
      goal: 0.1
    front_left_shoulder_joint:
      trajectory: 0.1
      goal: 0.1
    front_left_leg_joint:
      trajectory: 0.1
      goal: 0.1
    front_left_foot_joint:
      trajectory: 0.1
      goal: 0.1
    rear_right_shoulder_joint:
      trajectory: 0.1
      goal: 0.1
    rear_right_leg_joint:
      trajectory: 0.1
      goal: 0.1
    rear_right_foot_joint:
      trajectory: 0.1
      goal: 0.1
    rear_left_shoulder_joint:
      trajectory: 0.1
      goal: 0.1
    rear_left_leg_joint:
      trajectory: 0.1
      goal: 0.1
    rear_left_foot_joint:
      trajectory: 0.1
      goal: 0.1

  gains:
    front_right_shoulder_joint: {p: 100.0, i: 0.01, d: 10.0}
    front_right_leg_joint: {p: 100.0, i: 0.01, d: 10.0}
    front_right_foot_joint: {p: 100.0, i: 0.01, d: 10.0}
    front_left_shoulder_joint: {p: 100.0, i: 0.01, d: 10.0}
    front_left_leg_joint: {p: 100.0, i: 0.01, d: 10.0}
    front_left_foot_joint: {p: 100.0, i: 0.01, d: 10.0}
    rear_right_shoulder_joint: {p: 100.0, i: 0.01, d: 10.0}
    rear_right_leg_joint: {p: 100.0, i: 0.01, d: 10.0}
    rear_right_foot_joint: {p: 100.0, i: 0.01, d: 10.0}
    rear_left_shoulder_joint: {p: 100.0, i: 0.01, d: 10.0}
    rear_left_leg_joint: {p: 100.0, i: 0.01, d: 10.0}
    rear_left_foot_joint: {p: 100.0, i: 0.01, d: 10.0}

  publish_rate: 50
  action_monitor_rate: 20
  stop_trajectory_duration: 0.5
  state_publish_rate: 25
  allow_partial_joints_goal: false
