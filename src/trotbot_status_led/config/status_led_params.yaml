# RQ-023 状态灯节点参数
status_led_node:
  ros__parameters:
    # spidev：SPI MOSI 编码发 WS2812（推荐量产；波形由硬件移位）。鲁班猫 40PIN Pin19 = SPI0_MOSI_M2 → DIN。
    # rockchip_mmap：GPIO 寄存器 bitbang（Pin16 GPIO3_C1 方案）；需 sudo + /dev/mem。
    # gpiod：易发白，仅调试。
    ws2812_backend: "spidev"

    # SPI 设备节点：`ls /dev/spidev*`；SPI0 M2 通常为 **`spidev0.0`**（Pin19 MOSI）。若仅有 rkspi-dev* 见 README。
    spidev_path: "/dev/spidev0.0"
    spidev_max_speed_hz: 6400000
    # 帧尾 0x00 加长 RESET；首灯仍闪绿可试 180～280
    spidev_reset_trailer_bytes: 280
    # 每次 write 前短暂空闲（µs），拉长首比特前的低电平；可试 80～200
    spidev_pre_write_idle_us: 200
    # 在 WS2812 载荷前追加裸 SPI 字节 0x00（实验性）；无效则改回 0
    spidev_leading_spi_zero_bytes: 0
    # 默认 -1 使用内置 0xC0 / 0xF8（与 6.4MHz 常见表）；发光不对再微调 bit 与 hz
    spidev_bit0_byte: -1
    spidev_bit1_byte: -1

    # rockchip_mmap 用：RK3588 GPIO3 控制器物理基址 0xFEC40000
    mmap_gpio_phys_base: 4274257920

    # gpiod / mmap 一次性 mux：鲁班猫 Pin16 ↔ GPIO3_C1 → gpiochip3 line 17
    gpiochip: "gpiochip3"
    gpio_line_offset: 17

    led_count: 16
    # 固定纯色调试：true 时忽略灯语 YAML，全环同一颜色（便于观察闪烁）。量产请改回 false。
    debug_fixed_color: false
    debug_fixed_r: 10
    debug_fixed_g: 0
    debug_fixed_b: 0
    # 固定色模式下建议 1.0，亮度主要靠 debug_fixed_*；恢复灯语时可改回 0.1 等
    global_brightness: 1.0

    state_map_file: "config/status_led_map.yaml"

    state_topic: "/power_sequence/state"
    gate_topic: "/power_sequence/gate_open"

    # 固定纯色时可略降（如 20～30）减轻刷新频率，便于判断是否帧抖
    refresh_hz: 25.0

    # 桌面 / CI 无 GPIO：true 时不访问硬件（仍为 degradation 语义的一种）
    simulate_hardware: false

    # GPIO mmap/gpiod 发码时可开；spidev 通常不必（可改 false / -1）
    mlock_all: false
    realtime_sched_priority: -1

    # 以下 timing_* 仅 rockchip_mmap / gpiod 使用；spidev 由 SPI 时钟与编码字节决定
    timing_t0h_ns: 280
    timing_t0l_ns: 900
    timing_t1h_ns: 650
    timing_t1l_ns: 450
    timing_reset_us: 400
    timing_lead_in_reset_us: 800
    timing_pre_frame_idle_us: 0
