# 直线灯带 8 灯（led_count 见 status_led_params.yaml）。SPI/MOSI 或 GPIO DIN 由后端决定。
# gpiochip + line offset 随镜像/DTS 变化，请在目标板执行 `gpioinfo <chip>` 实测后写入参数 YAML。
#
# gate: 与 /power_sequence/gate_open 组合；省略或 null 表示不区分 gate。
#
# 扩展（后续）：effect — solid（默认）| breath | chase
#   breath：需 breath_period_s（秒/周期）；节点用 animation_refresh_hz 定时刷新。
#   chase：预留流水；当前按 solid 渲染同一 RGB。
# 默认全部为静态亮度；refresh_on_change_only=true 时仅在状态/gate 变化时写硬件（呼吸规则仍会起动画定时器）。

version: 2

# 无匹配规则时的默认 RGB
default_rgb: [40, 40, 40]

# 自上而下优先匹配（先写更具体的规则，例如 Running+gate 再写其它 Running）
rules:
  - state: Fault
    rgb: [255, 0, 0]

  # power_sequence 未覆盖状态机值时 String 为 \"Unknown\"，便于与灯语表未命中区分
  - state: Unknown
    rgb: [255, 0, 255]

  - state: Idle
    rgb: [0, 0, 128]

  - state: Disable
    rgb: [0, 0, 80]

  - state: Precheck
    rgb: [255, 140, 0]

  - state: EnableInit
    rgb: [255, 200, 0]

  - state: SoftStand
    rgb: [255, 220, 0]

  - state: Running
    gate: true
    rgb: [0, 255, 0]

  - state: Running
    gate: false
    rgb: [180, 255, 0]

  - state: SoftProne
    rgb: [255, 80, 0]

  - state: ProneHold
    rgb: [0, 128, 255]
